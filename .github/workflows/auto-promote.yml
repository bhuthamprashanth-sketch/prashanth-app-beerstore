name: Auto Promote Branches

on:
  push:
    branches: [develop, qa, release]

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR and attempt auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const source = context.ref.replace('refs/heads/', '');
            const mapping = { develop: 'qa', qa: 'release', release: 'main' };
            const target = mapping[source];

            if (!target) {
              core.info(`No target for ${source}; skipping.`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const openPrs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${source}`,
              base: target
            });

            let pr;
            if (openPrs.length > 0) {
              pr = openPrs[0];
              core.info(`Existing PR #${pr.number} ${source} -> ${target}`);
            } else {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                head: source,
                base: target,
                title: `[auto-promote] ${source} -> ${target}`,
                body: `Automatic promotion PR after push to \`${source}\`\n\nThis PR was created by workflow \`Auto Promote Branches\`.`
              });
              pr = created.data;
              core.info(`Created PR #${pr.number} ${source} -> ${target}`);
            }

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pr.number,
                merge_method: 'merge'
              });
              core.info(`Merged PR #${pr.number} into ${target}`);
            } catch (err) {
              core.warning(`Auto-merge failed for PR #${pr.number}: ${err.message}`);
            }
