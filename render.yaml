services:
  # ── PROD ── (branch: main)
  - type: web
    name: prashanth-app-beerstore
    runtime: node
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm install && npm --prefix backend install && npm --prefix frontend install && npm --prefix frontend run build
    startCommand: node backend/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        value: BeerStore_PROD_2026_Key
      - key: ENV_NAME
        value: prod

  # ── STG ── (branch: release)
  - type: web
    name: prashanth-app-beerstore-stg
    runtime: node
